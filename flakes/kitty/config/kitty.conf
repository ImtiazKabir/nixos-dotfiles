# Font settings
font_family      MartianMono Nerd Font
font_size        12.0

# Window and Layouts
remember_window_size  no
initial_width         960
initial_height        600
window_padding_width  8
confirm_os_window_close 0

# Performance & Aesthetics
repaint_delay    10
input_delay      3
sync_to_monitor  yes
enable_audio_bell no
update_check_interval 0

# Cursor & Mouse
cursor_shape          block
shell_integration     no-cursor
mouse_hide_wait       2.0

# Color Scheme (Clean Dark Theme matches Gruber Darker vibe)
background            #181818
foreground            #e4e4e4
cursor                #f5f5f5
selection_background  #303030
selection_foreground  #e4e4e4

# Color Palette
color0  #282828
