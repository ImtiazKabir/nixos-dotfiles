# =============================================================================
# Font
# =============================================================================
font_family      MartianMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.5


# Ligatures
font_features MartianMonoNFM-Regular  +calt +liga
font_features MartianMonoNFM-Bold     +calt +liga
font_features MartianMonoNFM-SemBd    +calt +liga

# =============================================================================
# Cursor
# =============================================================================
cursor_shape           block
cursor_blink_interval  0
cursor_stop_blinking_after 0

# =============================================================================
# Scrollback
# =============================================================================
scrollback_lines       10000
scrollback_pager_history_size 0

# =============================================================================
# Mouse
# =============================================================================
mouse_hide_wait        3.0
copy_on_select         no
focus_follows_mouse    no

# =============================================================================
# Performance
# =============================================================================
repaint_delay          10
input_delay            3
sync_to_monitor        yes

# =============================================================================
# Terminal Bell
# =============================================================================
enable_audio_bell      no
visual_bell_duration   0.0
window_alert_on_bell   yes
bell_on_tab            yes

# =============================================================================
# Window Layout
# =============================================================================
remember_window_size   yes
initial_window_width   220c
initial_window_height  50c

window_padding_width   8
window_margin_width    0

hide_window_decorations no
confirm_os_window_close 0

# =============================================================================
# Tab Bar
# =============================================================================
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_min_tabs       2
tab_title_template     "{index}: {title}"
active_tab_title_template "{index}: {title}"

# =============================================================================
# Color Scheme
# =============================================================================
include theme.conf


# =============================================================================
# Keyboard Shortcuts
# =============================================================================
clear_all_shortcuts no

# Clipboard
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard

# Scrolling
map ctrl+shift+k  scroll_line_up
map ctrl+shift+j  scroll_line_down
map ctrl+shift+u  scroll_page_up
map ctrl+shift+d  scroll_page_down
map ctrl+shift+g  scroll_to_top
map ctrl+shift+e  scroll_to_bottom

# Window management
map ctrl+shift+enter new_window
map ctrl+shift+w      close_window
map ctrl+shift+]      next_window
map ctrl+shift+[      previous_window

# Tab management
map ctrl+shift+t      new_tab
map ctrl+shift+q      close_tab
map ctrl+shift+right  next_tab
map ctrl+shift+left   previous_tab
map ctrl+shift+l      next_tab
map ctrl+shift+h      previous_tab

# Font size
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# =============================================================================
# Miscellaneous
# =============================================================================
shell_integration      enabled
term                   xterm-256color
close_on_child_death   no
allow_remote_control   no
update_check_interval  0
